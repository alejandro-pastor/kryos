name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=${VERSION#v} -X main.commit=${COMMIT:0:7}" \
            -o kryos ./cmd/kryos
          chmod +x kryos
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: kryos
          generate_release_notes: true
